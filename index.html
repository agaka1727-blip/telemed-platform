<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Поиск врачей — TeleMed</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f9;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 42px;
            font-weight: 700;
            color: #0b2b4a;
        }
        .header p {
            color: #5a6f88;
            font-size: 18px;
            margin-top: 8px;
        }
        .search-box {
            background: white;
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            max-width: 700px;
            margin: 0 auto 40px;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 14px 0;
            color: #0b2b4a;
        }
        .search-box input::placeholder {
            color: #9aafc4;
        }
        .search-box button {
            background: #1a73e8;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #1558b0;
        }
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .doctor-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            border: 1px solid #e8edf3;
            transition: 0.2s;
        }
        .doctor-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .doctor-card .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #dce4ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: #1a3d5e;
            margin-bottom: 16px;
        }
        .doctor-card h3 {
            font-size: 18px;
            color: #0b2b4a;
            margin-bottom: 4px;
        }
        .doctor-card .specialization {
            color: #1a73e8;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .doctor-card .symptoms {
            color: #5a6f88;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .doctor-card .symptoms span {
            background: #eef3f9;
            padding: 2px 10px;
            border-radius: 12px;
            margin: 2px 4px 2px 0;
            display: inline-block;
            font-size: 12px;
        }
        .doctor-card .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eef3f9;
            padding-top: 14px;
            margin-top: 6px;
        }
        .doctor-card .price {
            font-weight: 700;
            font-size: 18px;
            color: #0b2b4a;
        }
        .doctor-card .price small {
            font-weight: 400;
            font-size: 14px;
            color: #7a8fa5;
        }
        .verified-badge {
            display: inline-block;
            background: #e6f7e6;
            color: #1e7e34;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .btn-call {
            background: #1e7e34;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-call:hover {
            background: #146128;
        }
        .btn-chat {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-chat:hover {
            background: #1558b0;
        }
        /* Слоты времени */
        .slot {
            display: inline-block;
            padding: 6px 14px;
            background: #1a73e8;
            color: white;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            border: none;
        }
        .slot:hover {
            background: #1558b0;
            transform: scale(1.02);
        }
        .slot.booked {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .slot.booked:hover {
            transform: none;
            background: #ccc;
        }
        .loading {
            text-align: center;
            color: #7a8fa5;
            padding: 60px 0;
            font-size: 18px;
        }
        .no-results {
            text-align: center;
            color: #7a8fa5;
            padding: 40px 0;
            font-size: 18px;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-bar button {
            background: white;
            border: 1.5px solid #e8edf3;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #0b2b4a;
        }
        .filter-bar button.active {
            background: #1a73e8;
            color: white;
            border-color: #1a73e8;
        }
        .admin-note {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: #9aafc4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🩺 Найти врача</h1>
        <p>Ищите по ФИО, специализации или симптомам</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Например: уролог, цистит, Иванов..." />
        <button onclick="searchDoctors()">Найти</button>
    </div>

    <div class="filter-bar">
        <button class="active" data-filter="all" onclick="setFilter('all')">Все врачи</button>
        <button data-filter="verified" onclick="setFilter('verified')">✅ Проверенные</button>
    </div>

    <div id="doctorsContainer" class="doctors-grid">
        <div class="loading">Загрузка врачей...</div>
    </div>

    <div class="admin-note">
        🔐 Администратор: редактируйте список врачей в коде ниже (массив DOCTORS)
    </div>
</div>

<script>
    // ============================================================
    // 1. БАЗА ДАННЫХ ВРАЧЕЙ (ДОБАВЛЯЙТЕ ВРАЧЕЙ СЮДА!)
    //    Чтобы добавить нового врача, скопируйте { ... } и вставьте
    //    через запятую в массив DOCTORS
    // ============================================================
    const DOCTORS = [
        {
            full_name: "Иванов Сергей Петрович",
            specialization: "Врач-уролог",
            symptoms: ["цистит", "простатит", "мочекаменная болезнь"],
            experience: 22,
            price: 3500,
            verified: true,
            bio: "Врач-уролог высшей категории. Стаж 22 года.",
            video: "https://meet.jit.si/Urolog_Ivanov",
            schedule: ["10:00", "11:00", "12:00", "14:00", "15:00"]
        },
        {
            full_name: "Сариева Алия",
            specialization: "Юрист (медицинское право)",
            symptoms: ["юридические консультации", "медицинские споры"],
            experience: 18,
            price: 5000,
            verified: true,
            bio: "Юрист с 18-летним стажем. Специализируюсь на медицинском праве.",
            video: "https://meet.jit.si/SarievaAlia",
            schedule: ["09:00", "10:00", "11:00", "13:00", "14:00"]
        },
        {
            full_name: "Петрова Елена Викторовна",
            specialization: "Терапевт",
            symptoms: ["кашель", "температура", "боль в горле", "грипп"],
            experience: 15,
            price: 2500,
            verified: false,
            bio: "Терапевт с 15-летним стажем. Диагностика и лечение простудных заболеваний.",
            video: "https://meet.jit.si/Therapist_Petrova",
            schedule: ["08:00", "09:00", "10:00", "11:00", "12:00"]
        }
    ];

    // ============================================================
    // 2. ФУНКЦИЯ ЗАПИСИ НА ПРИЁМ
    //    НОМЕР ТЕЛЕФОНА УЖЕ ВСТАВЛЕН: +996552910846
    // ============================================================
    function bookSlot(doctorName, time) {
        const phone = '996552910846';  // ВАШ НОМЕР

        let message = `Здравствуйте! Я хочу записаться к врачу: ${doctorName}`;
        if (time) {
            message += ` на ${time}`;
        }
        message += '. Благодарю!';

        const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }

    // ============================================================
    // 3. ПОИСК И ФИЛЬТРАЦИЯ (НЕ ТРОГАЙТЕ)
    // ============================================================
    let currentFilter = 'all';

    function searchDoctors() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const container = document.getElementById('doctorsContainer');

        let results = DOCTORS;

        if (currentFilter === 'verified') {
            results = results.filter(doc => doc.verified === true);
        }

        if (query.length > 0) {
            results = results.filter(doc => {
                const fullName = doc.full_name.toLowerCase();
                const spec = doc.specialization.toLowerCase();
                const symptoms = doc.symptoms.map(s => s.toLowerCase()).join(' ');
                return fullName.includes(query) || spec.includes(query) || symptoms.includes(query);
            });
        }

        results.sort((a, b) => (a.verified === b.verified) ? 0 : a.verified ? -1 : 1);

        renderDoctors(results);
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-bar button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === filter);
        });
        searchDoctors();
    }

    // ============================================================
    // 4. ОТРИСОВКА КАРТОЧЕК (НЕ ТРОГАЙТЕ)
    // ============================================================
    function renderDoctors(doctors) {
        const container = document.getElementById('doctorsContainer');

        if (doctors.length === 0) {
            container.innerHTML = '<div class="no-results">👀 Врачей не найдено</div>';
            return;
        }

        container.innerHTML = doctors.map(doc => {
            const initials = doc.full_name
                .split(' ')
                .map(word => word[0])
                .join('')
                .slice(0, 2)
                .toUpperCase();

            let symptomsHtml = '';
            if (doc.symptoms && Array.isArray(doc.symptoms)) {
                symptomsHtml = doc.symptoms.map(s => `<span>${s}</span>`).join(' ');
            }

            const verifiedBadge = doc.verified
                ? '<span class="verified-badge">✅ Проверен</span>'
                : '';

            const videoLink = doc.video || `https://meet.jit.si/Doctor_${doc.id}`;

            let slotsHtml = '';
            if (doc.schedule && Array.isArray(doc.schedule)) {
                slotsHtml = doc.schedule.map(time => `
                    <div class="slot" onclick="bookSlot('${doc.full_name}', '${time}')">
                        🕐 ${time}
                    </div>
                `).join('');
            } else {
                slotsHtml = '<div style="color:#7a8fa5;font-size:13px;">Расписание уточняйте у администратора</div>';
            }

            return `
                <div class="doctor-card">
                    <div class="avatar">${initials}</div>
                    <h3>${doc.full_name} ${verifiedBadge}</h3>
                    <div class="specialization">${doc.specialization}</div>
                    <div class="symptoms">${symptomsHtml}</div>
                    <div class="info-row">
                        <span class="price">${doc.price || 0} <small>₽</small></span>
                        <span style="font-size:14px;color:#5a6f88;">Стаж ${doc.experience || 0} лет</span>
                    </div>

                    <div style="margin-top:14px; border-top:1px solid #eef3f9; padding-top:12px;">
                        <p style="font-size:13px; color:#5a6f88; margin-bottom:8px; font-weight:600;">
                            📅 Доступное время для записи:
                        </p>
                        <div style="display:flex; flex-wrap:wrap; gap:8px;">
                            ${slotsHtml}
                        </div>
                    </div>

                    <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
                        <button onclick="bookSlot('${doc.full_name}', '')" class="btn-chat">
                            💬 Записаться
                        </button>
                        <a href="${videoLink}" target="_blank" class="btn-call">📹 Видеозвонок</a>
                    </div>

                    ${doc.bio ? `<p style="font-size:13px;color:#5a6f88;margin-top:12px;border-top:1px solid #eef3f9;padding-top:10px;">${doc.bio}</p>` : ''}
                </div>
            `;
        }).join('');
    }

    // ============================================================
    // 5. ЗАГРУЗКА ПРИ СТАРТЕ
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        searchDoctors();
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchDoctors();
        });
    });
</script>

</body>
</html>
