<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Поиск врачей — Телемедицина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f9;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 42px;
            font-weight: 700;
            color: #0b2b4a;
        }
        .header p {
            color: #5a6f88;
            font-size: 18px;
            margin-top: 8px;
        }
        .search-box {
            background: white;
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            max-width: 700px;
            margin: 0 auto 40px;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 14px 0;
            color: #0b2b4a;
        }
        .search-box input::placeholder {
            color: #9aafc4;
        }
        .search-box button {
            background: #1a73e8;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #1558b0;
        }
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .doctor-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            transition: 0.2s;
            border: 1px solid #e8edf3;
        }
        .doctor-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .doctor-card .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #dce4ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: #1a3d5e;
            margin-bottom: 16px;
        }
        .doctor-card h3 {
            font-size: 18px;
            color: #0b2b4a;
            margin-bottom: 4px;
        }
        .doctor-card .specialization {
            color: #1a73e8;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .doctor-card .symptoms {
            color: #5a6f88;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .doctor-card .symptoms span {
            background: #eef3f9;
            padding: 2px 10px;
            border-radius: 12px;
            margin: 2px 4px 2px 0;
            display: inline-block;
            font-size: 12px;
        }
        .doctor-card .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eef3f9;
            padding-top: 14px;
            margin-top: 6px;
        }
        .doctor-card .price {
            font-weight: 700;
            font-size: 18px;
            color: #0b2b4a;
        }
        .doctor-card .price small {
            font-weight: 400;
            font-size: 14px;
            color: #7a8fa5;
        }
        .verified-badge {
            display: inline-block;
            background: #e6f7e6;
            color: #1e7e34;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .btn-call {
            background: #1e7e34;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-call:hover {
            background: #146128;
        }
        .loading {
            text-align: center;
            color: #7a8fa5;
            padding: 60px 0;
            font-size: 18px;
        }
        .no-results {
            text-align: center;
            color: #7a8fa5;
            padding: 40px 0;
            font-size: 18px;
        }
        .admin-note {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: #9aafc4;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-bar button {
            background: white;
            border: 1.5px solid #e8edf3;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #0b2b4a;
        }
        .filter-bar button.active {
            background: #1a73e8;
            color: white;
            border-color: #1a73e8;
        }
        .filter-bar button:hover:not(.active) {
            border-color: #1a73e8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🩺 Найти врача</h1>
        <p>Ищите по ФИО, специализации или симптомам</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Например: кардиолог, головная боль, Иванова..." />
        <button onclick="searchDoctors()">Найти</button>
    </div>

    <div class="filter-bar">
        <button class="active" data-filter="all" onclick="setFilter('all')">Все врачи</button>
        <button data-filter="verified" onclick="setFilter('verified')">✅ Проверенные</button>
    </div>

    <div id="doctorsContainer" class="doctors-grid">
        <div class="loading">Загрузка врачей...</div>
    </div>

    <div class="admin-note">
        🔐 Администратор: редактируйте список врачей в файле doctorsData.js
    </div>
</div>

<script>
    // ============================================================
    // 1. БАЗА ДАННЫХ ВРАЧЕЙ (ХРАНИТСЯ ПРЯМО В КОДЕ)
    //    Добавляйте врачей сюда, и они появятся на сайте!
    // ============================================================
    const DOCTORS = [
        {
            id: 1,
            full_name: "Сариева Алия",
            specialization: "Юрист (медицинское право)",
            symptoms: ["юридические консультации", "медицинские споры", "трудовые споры"],
            experience: 18,
            price: 5000,
            verified: true,
            bio: "Юрист с 18-летним стажем. Специализируюсь на медицинском праве.",
            video_room: "https://meet.jit.si/SarievaAlia"
        },
        {
            id: 2,
            full_name: "Иванов Сергей Петрович",
            specialization: "Врач-уролог",
            symptoms: ["цистит", "пиелонефрит", "простатит", "мочекаменная болезнь"],
            experience: 22,
            price: 3500,
            verified: true,
            bio: "Врач-уролог высшей категории. Стаж 22 года.",
            video_room: "https://meet.jit.si/Urolog_Ivanov"
        },
        {
            id: 3,
            full_name: "Петрова Елена Викторовна",
            specialization: "Терапевт",
            symptoms: ["кашель", "температура", "боль в горле", "грипп"],
            experience: 15,
            price: 2500,
            verified: false,
            bio: "Терапевт с 15-летним стажем. Диагностика и лечение простудных заболеваний.",
            video_room: "https://meet.jit.si/Therapist_Petrova"
        }
    ];

    // ============================================================
    // 2. ПОИСК И ФИЛЬТРАЦИЯ
    // ============================================================
    let currentFilter = 'all';

    function searchDoctors() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const container = document.getElementById('doctorsContainer');

        let results = DOCTORS;

        // Фильтр по статусу проверки
        if (currentFilter === 'verified') {
            results = results.filter(doc => doc.verified === true);
        }

        // Поиск по тексту (ФИО, специализация, симптомы)
        if (query.length > 0) {
            results = results.filter(doc => {
                const fullName = doc.full_name.toLowerCase();
                const spec = doc.specialization.toLowerCase();
                const symptoms = doc.symptoms.map(s => s.toLowerCase()).join(' ');
                return fullName.includes(query) || spec.includes(query) || symptoms.includes(query);
            });
        }

        // Сортируем: сначала проверенные
        results.sort((a, b) => (a.verified === b.verified) ? 0 : a.verified ? -1 : 1);

        renderDoctors(results);
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-bar button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === filter);
        });
        searchDoctors();
    }

    // ============================================================
    // 3. ОТРИСОВКА КАРТОЧЕК
    // ============================================================
    function renderDoctors(doctors) {
        const container = document.getElementById('doctorsContainer');

        if (doctors.length === 0) {
            container.innerHTML = '<div class="no-results">👀 Врачей не найдено</div>';
            return;
        }

        container.innerHTML = doctors.map(doc => {
            const initials = doc.full_name
                .split(' ')
                .map(word => word[0])
                .join('')
                .slice(0, 2)
                .toUpperCase();

            let symptomsHtml = '';
            if (doc.symptoms && Array.isArray(doc.symptoms)) {
                symptomsHtml = doc.symptoms.map(s => `<span>${s}</span>`).join(' ');
            }

            const verifiedBadge = doc.verified
                ? '<span class="verified-badge">✅ Проверен</span>'
                : '';

            const videoLink = doc.video_room || `https://meet.jit.si/Doctor_${doc.id}`;

            return `
                <div class="doctor-card">
                    <div class="avatar">${initials}</div>
                    <h3>${doc.full_name} ${verifiedBadge}</h3>
                    <div class="specialization">${doc.specialization}</div>
                    <div class="symptoms">${symptomsHtml}</div>
                    <div class="info-row">
                        <span class="price">${doc.price || 0} <small>₽</small></span>
                        <span style="font-size:14px;color:#5a6f88;">Стаж ${doc.experience || 0} лет</span>
                    </div>
                    <div style="margin-top:14px; display:flex; gap:10px;">
                        <a href="${videoLink}" target="_blank" class="btn-call">📹 Видеозвонок</a>
                    </div>
                    ${doc.bio ? `<p style="font-size:13px;color:#5a6f88;margin-top:12px;border-top:1px solid #eef3f9;padding-top:10px;">${doc.bio}</p>` : ''}
                </div>
            `;
        }).join('');
    }

    // ============================================================
    // 4. ЗАГРУЗКА ПРИ СТАРТЕ
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        searchDoctors();
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchDoctors();
        });
    });
</script>

</body>
</html>
